services:
  medisalud-api:
    build: .
    container_name: medisalud-appointments-api
    ports:
      - "8080:8080"
    environment:
      H2_CONSOLE_ENABLED: "false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health/readiness"]
      interval: 30s
      timeout: 5s
      retries: 5
